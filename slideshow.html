<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Roboto:wght@400;500;700&family=Vazirmatn:wght@400;500;600;700&family=Lalezar&family=Markazi+Text:wght@400;500;600;700&family=Readex+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"> 
  <title>Slide Show</title>
  <link rel="stylesheet" href="slideshow.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-header-left">
      <a href="decks.html" id="decksLink" title="All Decks" style="color:#a0a0b8;text-decoration:none;font-size:0.9rem;line-height:1;margin-right:0.25rem;transition:color 0.2s;display:flex;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a0a0b8'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></a>
      <h3 id="deckNameHeading"></h3>
      <div class="rename-spinner" id="renameSpinner"></div>
      <span id="slideCount">1</span>
    </div>
    <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">&times;</button>
  </div>
  <div class="sidebar-thumbnails" id="thumbnails">
    <div class="skeleton skeleton-thumb" id="skeletonThumb1"><div class="skeleton skeleton-thumb-box"></div><div class="skeleton skeleton-thumb-line"></div></div>
    <div class="skeleton skeleton-thumb" id="skeletonThumb2"><div class="skeleton skeleton-thumb-box"></div><div class="skeleton skeleton-thumb-line short"></div></div>
    <div class="skeleton skeleton-thumb" id="skeletonThumb3"><div class="skeleton skeleton-thumb-box"></div><div class="skeleton skeleton-thumb-line"></div></div>
  </div>
  <button class="sidebar-add-btn" id="sidebarAddBtn"><svg class="svg-icon" style="width: 1.5em; height: 1.5em;vertical-align: middle;fill: currentColor;overflow: hidden;" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"><path d="M514 912c-219.9 0-398.8-178.9-398.8-398.8S294.1 114.4 514 114.4s398.8 178.9 398.8 398.8S733.9 912 514 912z m0-701.5c-166.9 0-302.7 135.8-302.7 302.7 0 166.9 135.8 302.7 302.7 302.7s302.7-135.8 302.7-302.7c0-166.9-135.8-302.7-302.7-302.7z" fill="#666" /><path d="M570.1 569.3h126.3c30.9 0 56.1-25.2 56.1-56.1 0-30.9-25.2-56.1-56.1-56.1H570.1V330.8c0-30.9-25.2-56.1-56.1-56.1-30.9 0-56.1 25.2-56.1 56.1v126.3H331.6c-30.9 0-56.1 25.2-56.1 56.1 0 30.9 25.2 56.1 56.1 56.1h126.3v126.3c0 30.9 25.2 56.1 56.1 56.1s56.1-25.2 56.1-56.1V569.3z" fill="#aaa" /></svg> New Slide</button>
</div>

<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>

<div class="main-area">
  <div class="slideshow-container" id="slideshow">
    <div class="slide active" data-slide="0">
      <div class="slide-img-wrap">
        <img alt="" draggable="false">
        <div class="resize-handle nw"></div>
        <div class="resize-handle n"></div>
        <div class="resize-handle ne"></div>
        <div class="resize-handle e"></div>
        <div class="resize-handle se"></div>
        <div class="resize-handle s"></div>
        <div class="resize-handle sw"></div>
        <div class="resize-handle w"></div>
      </div>
      <div class="img-props" data-slide="0">
        <button data-mode="cover">Cover</button>
        <button data-mode="contain">Contain</button>
        <button data-mode="fill">Fill</button>
        <button data-mode="original">Original</button>
        <div class="bg-color-wrap"><input type="color" class="bg-color-input" value="#1a1a24" title="Background color"></div>
      </div>
      <div class="fallback-msg"><div class="fallback-box"><div class="fb-num">Slide Number 1</div><div class="fb-label">Import image or paste from clipboard</div></div></div>
      <div class="slide-url-bar"><input type="text" placeholder="/api/image/..." spellcheck="false"><button>Apply</button></div>
      <span class="slide-label">Slide 1</span>
      <span class="slide-number">1 / 1</span>
    </div>

    <button class="nav-arrow prev" id="prevBtn" aria-label="Previous slide">&#8249;</button>
    <button class="nav-arrow next" id="nextBtn" aria-label="Next slide">&#8250;</button>

    <div class="dots" id="dots"></div>
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
    <div class="skeleton-slide" id="skeletonSlide">
      <div class="skeleton-slide-box">
        <div class="skeleton-slide-circle"></div>
        <div class="skeleton-slide-line"></div>
        <div class="skeleton-slide-line"></div>
      </div>
    </div>
    <canvas id="laserCanvas"></canvas>
    <canvas class="draw-canvas" id="drawCanvas"></canvas>
    <div class="draw-toolbar" id="drawToolbar"><!-- content... -->
      <span class="draw-label">Draw</span>
      <input type="color" id="drawColor" value="#ff4444">
      <input type="range" id="drawSize" min="1" max="20" value="4">
      <span class="draw-size-label" id="drawSizeLabel">4</span>
      <button id="drawUndo">Undo</button>
      <button id="drawErase">Erase</button>
      <button id="drawToggleBtnToolbar">Done</button>
    </div>

    <div class="shape-props" id="shapeProps">
      <span class="shape-prop-group"><label>Fill</label><input type="color" id="shapeFill" value="#6366f1"></span>
      <span class="shape-prop-group" id="shapeFillOpacityGroup"><input type="range" id="shapeFillOpacity" min="0" max="1" step="0.05" value="1" style="width:48px"><label class="opacity-label" id="shapeFillOpacityLabel">100%</label></span>
      <span class="shape-prop-group" id="shapeStrokeGroup"><label>Stroke</label><input type="color" id="shapeStroke" value="#ffffff"></span>
      <span class="shape-prop-group" id="shapeStrokeOpacityGroup"><input type="range" id="shapeStrokeOpacity" min="0" max="1" step="0.05" value="1" style="width:48px"><label class="opacity-label" id="shapeStrokeOpacityLabel">100%</label></span>
      <span class="shape-prop-group" id="shapeStrokeWidthGroup"><label>W</label><input type="number" id="shapeStrokeWidth" value="2" min="0" max="20" style="width:36px"></span>
      <span class="shape-prop-group" id="shapeLineWeightGroup" style="display:none"><label>Weight</label><input type="range" id="shapeLineWeightSlider" min="1" max="20" value="3" style="width:52px"><input type="number" id="shapeLineWeight" value="3" min="1" max="20" style="width:36px"></span>
      <span class="shape-prop-group" id="shapeLineDashGroup" style="display:none">
        <select id="shapeLineDash">
          <option value="solid">Solid</option>
          <option value="dashed">Dashed</option>
          <option value="dotted">Dotted</option>
          <option value="dashdot">Dash-dot</option>
        </select>
      </span>
      <span class="shape-prop-group" id="shapeFontSizeGroup" style="display:none"><label>Size</label><input type="number" id="shapeFontSize" value="28" min="8" max="200" style="width:44px"></span>
      <span class="shape-prop-group" id="shapeBgGroup" style="display:none"><label>Bg</label><input type="color" id="shapeBgColor" value="#000000"><input type="range" id="shapeBgOpacity" min="0" max="1" step="0.05" value="0" style="width:48px"><label class="opacity-label" id="shapeBgOpacityLabel">0%</label></span>
      <span class="shape-prop-group" id="shapeFontGroup" style="display:none">
        <select id="shapeFontFamily" style="width:90px">
          <option value="Poppins">Poppins</option>
          <option value="Roboto">Roboto</option>
          <option value="Courier New">Courier New</option>
          <option value="Vazirmatn">Vazirmatn</option>
          <option value="Lalezar">Lalezar</option>
          <option value="Readex Pro">Readex Pro</option>
          <option value="Markazi Text">Markazi Text</option>
          <option value="Georgia">Georgia</option>
          <option value="Arial">Arial</option>
        </select>
      </span>
      <span class="shape-prop-group" id="shapeFormatGroup" style="display:none">
        <button class="shape-format-btn bold" id="shapeBoldBtn" title="Bold"><strong>B</strong></button>
        <button class="shape-format-btn italic" id="shapeItalicBtn" title="Italic"><em>I</em></button>
        <button class="shape-format-btn underline" id="shapeUnderlineBtn" title="Underline"><u>U</u></button>
      </span>
      <span class="shape-prop-group" id="shapeAlignGroup" style="display:none">
        <button class="shape-align-btn" data-align="left" title="Align left"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="7" x2="15" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="12" y2="17"/></svg></button>
        <button class="shape-align-btn" data-align="center" title="Align center"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="7" x2="19" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="6" y1="17" x2="18" y2="17"/></svg></button>
        <button class="shape-align-btn" data-align="right" title="Align right"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="17" x2="21" y2="17"/></svg></button>
      </span>
      <span class="shape-prop-group" id="shapeDirGroup" style="display:none">
        <button class="shape-dir-btn" data-dir="ltr" title="Left to right"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="15 7 20 12 15 17"/><line x1="4" y1="7" x2="10" y2="7"/></svg></button>
        <button class="shape-dir-btn" data-dir="rtl" title="Right to left"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="9 7 4 12 9 17"/><line x1="14" y1="7" x2="20" y2="7"/></svg></button>
      </span>
      <span class="shape-prop-group" id="shapeImageSrcGroup" style="display:none">
        <button id="shapeImageBrowseBtn" title="Browse files">Browse</button>
      </span>
      <span class="shape-prop-group"><label>Rot</label><input type="range" id="shapeRotationSlider" min="-360" max="360" value="0" style="width:60px"><input type="number" id="shapeRotation" value="0" min="-360" max="360" style="width:44px"></span>
      <button id="shapeZFrontBtn" class="shape-z-btn" title="Bring to front">&#9650;</button>
      <button id="shapeZBackBtn" class="shape-z-btn" title="Send to back">&#9660;</button>
      <button id="shapeDelBtn" class="shape-del-btn" title="Delete shape">&#10005;</button>
    </div>

    <button id="shapeFloatBtn" title="Add shape">+</button>
    <div class="shape-popup" id="shapePopup">
      <button class="shape-popup-btn" data-shape="rect"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/></svg> Rectangle</button>
      <button class="shape-popup-btn" data-shape="circle"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg> Circle</button>
      <button class="shape-popup-btn" data-shape="line"><svg viewBox="0 0 24 24"><line x1="3" y1="21" x2="21" y2="3"/></svg> Line</button>
      <button class="shape-popup-btn" data-shape="arrow"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="19" y2="12"/><polyline points="14 7 19 12 14 17"/></svg> Arrow</button>
      <button class="shape-popup-btn" data-shape="text"><svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg> Text</button>
      <button class="shape-popup-btn" data-shape="image"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Image</button>
    </div>

    <div id="presenterPanel">
      <div class="presenter-notes-wrap">
        <label for="presenterNotes">Speaker Notes</label>
        <textarea id="presenterNotes" placeholder="Notes for this slide..."></textarea>
      </div>
      <div class="presenter-timer-wrap">
        <div id="presenterTimer">00:00</div>
        <div class="presenter-timer-btns">
          <button id="presenterTimerStart">&#9654;</button>
          <button id="presenterTimerReset">&#8634;</button>
        </div>
      </div>
      <div class="presenter-next-wrap">
        <label>Up Next</label>
        <div id="presenterNextPreview"></div>
        <div class="presenter-next-label" id="presenterNextLabel"></div>
      </div>
    </div>
  </div>
</div>

<button class="settings-btn" id="settingsBtn" aria-label="Settings">&#9881;</button>
<button class="fullscreen-btn" id="fullscreenBtn" aria-label="Toggle fullscreen">&#9974;</button>
<button class="fullscreen-btn" id="laserToggleBtn" aria-label="Toggle laser pointer">&#9673;</button>
<button class="fullscreen-btn" id="drawToggleBtn" aria-label="Toggle drawing">&#9998;</button>
<button class="fullscreen-btn" id="presenterBtn" aria-label="Toggle presenter mode"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Slide Images</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-save" id="modalSave">Save</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMsg">Are you sure you want to delete this slide?</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirmCancel">Cancel</button>
      <button class="btn-danger" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" data-action="set-url">Set Image URL</div>
  <div class="ctx-item" data-action="remove">Remove Image</div>
  <div class="ctx-item" data-action="duplicate">Duplicate Slide</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item ctx-sub" data-action="fit">Fit Mode</div>
  <div class="ctx-submenu" id="ctxFitSub">
    <div class="ctx-item" data-action="fit-cover">Cover</div>
    <div class="ctx-item" data-action="fit-contain">Contain</div>
    <div class="ctx-item" data-action="fit-fill">Fill</div>
    <div class="ctx-item" data-action="fit-original">Original</div>
  </div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-action="copy">Copy Image URL</div>
    <div class="ctx-item" data-action="paste">Paste Image</div>
    <div class="ctx-item" data-action="shape-paste" id="slidePasteItem">Paste Shape</div>
  </div>
  <div class="ctx-menu" id="ctxShapeMenu">
    <div class="ctx-item" data-action="shape-copy">Copy</div>
    <div class="ctx-item" data-action="shape-cut">Cut</div>
    <div class="ctx-item" data-action="shape-paste" id="shapePasteItem">Paste</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-action="shape-duplicate">Duplicate</div>
    <div class="ctx-item" data-action="shape-delete">Delete</div>
  </div>

  <script src="slideshow.js"></script>
<div class="upload-loading" id="uploadLoading"><div class="spinner"></div></div>
<div class="toast-container" id="toastContainer"></div>
</body>
</html>
